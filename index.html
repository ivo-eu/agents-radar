<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📡 agents-radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="alternate" type="application/rss+xml" title="agents-radar RSS" href="./feed.xml">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    :root {
      --bg:         #0B0D14;
      --bg-side:    #080A10;
      --bg-hover:   #12151F;
      --bg-active:  #1A1E2E;
      --border:     #1E2235;
      --text:       #C9D1D9;
      --muted:      #636E82;
      --dim:        #2E3547;
      --accent:     #E8A03D;
      --accent-bg:  rgba(232,160,61,0.10);
      --code-bg:    #0D1017;
      --link:       #79B8FF;
    }
    [data-theme="light"] {
      --bg:         #FAFBFC;
      --bg-side:    #F0F2F5;
      --bg-hover:   #E8ECF1;
      --bg-active:  #DDE3EA;
      --border:     #D2D8E0;
      --text:       #1C1E26;
      --muted:      #5A6678;
      --dim:        #B8C2D0;
      --accent:     #B57200;
      --accent-bg:  rgba(181,114,0,0.08);
      --code-bg:    #F0F2F5;
      --link:       #0451A5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Space Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 50px;
      background: var(--bg-side); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand { font-size: 14px; font-weight: 700; letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 18px; animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.55} }
    .brand em { color: var(--accent); font-style: normal; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .signal {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .hdr-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 12px; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 10px; letter-spacing: 0.06em;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      transition: border-color 0.15s, color 0.15s;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hdr-btn.icon-only { padding: 4px 7px; }
    .hdr-btn svg { display: block; }
    .hdr-btn.connected { border-color: #2DA44E; color: #3FB950; }
    .hdr-btn.busy { border-color: var(--accent); color: var(--accent); }

    /* ── Body ── */
    #body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--bg-side); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 10px 0;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
    .side-label {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dim); padding: 4px 16px 10px;
    }
    .search-wrap { padding: 0 12px 10px; }
    #searchInput {
      width: 100%; height: 28px; padding: 0 9px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); color: var(--text);
      font-family: inherit; font-size: 11px;
    }
    #searchInput:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }
    #searchStatus {
      min-height: 14px; margin-top: 4px;
      font-size: 9px; letter-spacing: 0.04em; color: var(--dim);
    }
    /* ── Month group ── */
    .month-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; cursor: pointer;
      font-size: 12px; font-weight: 700; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 0.15s; user-select: none;
    }
    .month-hdr:hover { color: var(--muted); }
    .month-hdr.lit { color: var(--accent); }
    .month-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .month-group.open .month-body { max-height: 9999px; }
    .month-group.open > .month-hdr .arr { transform: rotate(90deg); }

    .date-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 14px 5px 22px; cursor: pointer;
      font-size: 13px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.04em; transition: color 0.15s; user-select: none;
    }
    .date-hdr:hover { color: var(--text); }
    .date-hdr.lit { color: var(--accent); }
    .date-hdr.search-hit {
      color: var(--accent);
      background: linear-gradient(90deg, var(--accent-bg), transparent);
    }
    .arr { font-size: 8px; transition: transform 0.2s; display: inline-block; }
    .date-group.open .arr { transform: rotate(90deg); }
    .rpt-list { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .date-group.open .rpt-list { max-height: 600px; }
    .rpt-btn {
      display: block; width: 100%; padding: 5px 14px 5px 26px;
      background: none; border: none; border-left: 2px solid transparent;
      text-align: left; cursor: pointer; font-family: inherit; font-size: 13px;
      color: var(--muted); transition: color 0.1s, background 0.1s, border-color 0.1s;
    }
    .rpt-btn:hover { background: var(--bg-hover); color: var(--text); }
    .rpt-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-bg); }
    .rpt-row { display: flex; align-items: center; padding: 5px 14px 5px 26px; }
    .rpt-label { flex: 1; font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lang-btns { display: flex; gap: 3px; flex-shrink: 0; }
    .lang-btn {
      background: none; border: 1px solid var(--dim); color: var(--dim);
      padding: 2px 7px; border-radius: 3px; cursor: pointer;
      font-family: inherit; font-size: 11px; letter-spacing: 0.06em;
      transition: border-color 0.1s, color 0.1s;
    }
    .lang-btn:hover { border-color: var(--muted); color: var(--muted); }
    .lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* ── Content ── */
    #cwrap { flex: 1; overflow-y: auto; }
    #cwrap::-webkit-scrollbar { width: 5px; }
    #cwrap::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
    #content { max-width: 820px; margin: 0 auto; padding: 36px 48px 72px; }

    .msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
      height: 240px; color: var(--muted); font-size: 11px; letter-spacing: 0.05em;
    }
    .msg-icon { font-size: 36px; opacity: 0.35; }

    @keyframes fadein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .fade { animation: fadein 0.3s ease; }

    /* ── Markdown ── */
    .md {
      font-family: 'Source Serif 4', Georgia, 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 16px; line-height: 1.8; color: var(--text);
    }
    .md h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; line-height: 1.3; letter-spacing: -0.02em; }
    .md h2 { font-size: 17px; font-weight: 600; margin: 30px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .md h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; }
    .md h4 { font-size: 13px; font-weight: 700; margin: 16px 0 6px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.03em; }
    .md p { margin-bottom: 12px; }
    .md a { color: var(--link); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md strong { font-weight: 600; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .md ul, .md ol { padding-left: 22px; margin-bottom: 12px; }
    .md li { margin-bottom: 4px; }
    .md li > ul, .md li > ol { margin-top: 4px; margin-bottom: 0; }
    .md blockquote { border-left: 3px solid var(--accent); padding: 6px 16px; margin: 12px 0; color: var(--muted); font-style: italic; }
    .md code {
      font-family: 'Space Mono', monospace; font-size: 12.5px;
      background: var(--code-bg); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 3px;
    }
    .md pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; overflow-x: auto; margin: 14px 0; }
    .md pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .md table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; font-family: 'Space Mono', monospace; }
    .md th { background: var(--code-bg); border: 1px solid var(--border); padding: 7px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .md td { border: 1px solid var(--border); padding: 7px 12px; vertical-align: top; }
    .md tr:nth-child(even) td { background: var(--bg-hover); }
    .md details { border: 1px solid var(--border); border-radius: 6px; margin: 10px 0; overflow: hidden; }
    .md summary {
      cursor: pointer; padding: 8px 14px;
      font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted);
      background: var(--code-bg); user-select: none; list-style: none;
      display: flex; align-items: center; gap: 8px; transition: color 0.15s;
    }
    .md summary::-webkit-details-marker { display: none; }
    .md summary::before { content: '▶'; font-size: 8px; flex-shrink: 0; }
    .md details[open] summary::before { content: '▼'; }
    .md summary:hover { color: var(--text); }
    .md details > *:not(summary) { padding: 12px 14px; }
    /* ── Favorites: in-report markers ── */
    .fav-report-btn {
      border: none; background: none; cursor: pointer;
      font-size: 19px; line-height: 1; color: var(--muted);
      margin-left: 10px; vertical-align: 2px;
      transition: color 0.15s, transform 0.15s;
    }
    .fav-report-btn:hover { color: var(--accent); transform: scale(1.15); }
    .fav-report-btn.saved { color: var(--accent); }
    .md h1.fav-report-saved {
      background: var(--accent-bg); border-left: 3px solid var(--accent);
      padding: 6px 0 6px 14px; margin-left: -17px; border-radius: 0 4px 4px 0;
    }
    /* Saved link: subtle tinted chip with a small accent tick on the left —
       no full-width underline (keeps long link text readable). */
    .md a.fav-link-saved {
      background: var(--accent-bg); border-radius: 3px;
      padding: 0 4px 0 7px; text-decoration: none;
      box-shadow: inset 2px 0 0 0 var(--accent);
    }
    .md a.fav-link-saved:hover { text-decoration: underline; }
    .md .fav-block-saved {
      background: var(--accent-bg); border-left: 2px solid var(--accent);
      padding-left: 10px; border-radius: 0 3px 3px 0;
    }
    @keyframes favflash {
      0%, 100% { background: transparent; box-shadow: none; }
      20%, 60% { background: var(--accent-bg); box-shadow: 0 0 0 5px var(--accent-bg); }
    }
    .fav-flash { animation: favflash 1.6s ease; border-radius: 3px; }

    /* floating bubble shared by link-hover and text-selection */
    .fav-popover {
      position: fixed; z-index: 200;
      background: var(--bg-active); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 4px; padding: 4px 10px;
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.04em;
      cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.4); white-space: nowrap;
      user-select: none; opacity: 0; transform: translateY(3px); pointer-events: none;
      transition: opacity 0.12s, transform 0.12s;
    }
    .fav-popover.show { opacity: 1; transform: none; pointer-events: auto; }
    .fav-popover:hover { background: var(--accent); color: var(--bg); }

    /* ── Sidebar: My Favorites ── */
    .fav-nav-head {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 16px 6px; font-size: 12px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.04em;
    }
    .fav-nav { padding: 0 12px 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .fav-nav-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 5px 10px; margin-bottom: 2px;
      background: none; border: 1px solid transparent; border-radius: 4px;
      text-align: left; cursor: pointer; font-family: inherit; font-size: 12px;
      color: var(--muted); transition: color 0.1s, background 0.1s, border-color 0.1s;
    }
    .fav-nav-btn:hover { background: var(--bg-hover); color: var(--text); }
    .fav-nav-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
    .fav-count { font-size: 10px; color: var(--dim); min-width: 16px; text-align: right; }
    .fav-nav-btn.active .fav-count { color: var(--accent); }

    /* ── Favorites list view ── */
    .fav-list-head { font-size: 21px; font-weight: 600; margin-bottom: 6px; font-family: 'Source Serif 4', serif; }
    .fav-list-sub { font-size: 11px; color: var(--muted); margin-bottom: 22px; letter-spacing: 0.04em; font-family: 'Space Mono', monospace; }
    .fav-group-label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); margin: 26px 0 12px; font-family: 'Space Mono', monospace;
    }
    .fav-card {
      border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px;
      margin-bottom: 12px; background: var(--bg-side); transition: border-color 0.15s;
    }
    .fav-card:hover { border-color: var(--dim); }
    .fav-card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; display: flex; gap: 8px; align-items: baseline; }
    .fav-badge {
      flex-shrink: 0; font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 0.06em; padding: 2px 6px; border-radius: 3px;
      background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent);
    }
    .fav-excerpt { font-size: 13px; color: var(--text); margin: 6px 0 10px; line-height: 1.6; }
    .fav-meta { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; line-height: 1.7; }
    .fav-actions { margin-top: 10px; display: flex; gap: 14px; flex-wrap: wrap; }
    .fav-action {
      background: none; border: none; padding: 0; cursor: pointer;
      font-family: 'Space Mono', monospace; font-size: 11px; color: var(--link);
      letter-spacing: 0.04em; transition: color 0.1s;
    }
    .fav-action:hover { text-decoration: underline; }
    .fav-action.danger { color: var(--muted); }
    .fav-action.danger:hover { color: #f85149; }
    .fav-empty { color: var(--muted); font-size: 13px; padding: 48px 0; text-align: center; }

    /* ── Mobile ── */
    #mob-toggle { display: none; }
    @media (max-width: 680px) {
      #hdr { padding: 0 12px; }
      .hdr-right { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      .hdr-btn { padding: 4px 8px; }
      .hdr-join { display: none; }
      .hdr-icon { display: none; }
      #rssLink { display: none; }
      #syncBtn { display: none; }
      body { overflow: auto; }
      #app { height: auto; min-height: 100vh; }
      #body { flex-direction: column; overflow: visible; }
      #cwrap { overflow: visible; }
      #sidebar {
        width: 100%; border-right: none; border-bottom: 1px solid var(--border);
        max-height: 48px; overflow: hidden; padding: 0;
        transition: max-height 0.3s ease;
      }
      #sidebar.open { max-height: 60vh; overflow-y: auto; padding: 0 0 8px; }
      #mob-toggle {
        display: flex; align-items: center; gap: 8px;
        height: 48px; padding: 0 16px; cursor: pointer;
        font-size: 11px; color: var(--muted); border-bottom: 1px solid transparent;
        transition: color 0.15s;
      }
      #mob-toggle:hover { color: var(--text); }
      #sidebar.open #mob-toggle { border-bottom-color: var(--border); }
      .side-label { margin-top: 8px; }
      #content { padding: 20px 16px 48px; }
      .md { font-size: 15px; }
      .md h1.fav-report-saved { margin-left: 0; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="brand">
      <span class="brand-icon">📡</span>
      <span>agents-<em>radar</em></span>
    </div>
    <div class="hdr-right">
      <div class="signal"></div>
      <a class="hdr-btn icon-only" href="https://github.com/ivo-eu/agents-radar" target="_blank" rel="noopener noreferrer" title="GitHub" aria-label="GitHub">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>

      <a class="hdr-btn" href="https://t.me/agents_radar" target="_blank" rel="noopener noreferrer" title="Join Telegram"><span class="hdr-icon">✈</span><span class="hdr-join">Join</span>Telegram</a>
      <a class="hdr-btn" href="https://applink.feishu.cn/client/chat/chatter/add_by_link?link_token=478g7865-04a8-4fab-a7f8-23af85ba927b" target="_blank" rel="noopener noreferrer" title="Join Feishu Group"><span class="hdr-icon">◈</span><span class="hdr-join">Join</span>Feishu<span class="hdr-join">Group</span></a>
      <a id="rssLink" class="hdr-btn" href="./feed.xml" title="RSS Feed"><span class="hdr-icon">⊕</span>RSS</a>

      <button id="bridgeBtn" class="hdr-btn" title="连接本地 SecondBrain">本机未连接</button>
      <button id="themeBtn" class="hdr-btn"><span class="hdr-icon">◐</span><span class="hdr-label">LIGHT</span></button>

  <div id="body">
    <div id="sidebar">
      <div id="mob-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        ☰ &nbsp;选择报告
      </div>
      <div class="fav-nav-head">★ 我的收藏</div>
      <div class="fav-nav" id="favNav"></div>
      <div class="side-label">REPORTS</div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="搜索全文，如 Claude">

<script>
marked.use({ breaks: true, gfm: true });

// Allow <details> and <summary> which DOMPurify strips by default
DOMPurify.addHook('uponSanitizeElement', (node, data) => {
  if (data.tagName === 'details' || data.tagName === 'summary') {
    data.allowedTags[data.tagName] = true;
  }
});

function renderMarkdown(raw) {
  const html = marked.parse(raw);
  return DOMPurify.sanitize(html, {
    ADD_TAGS: ['details', 'summary'],
    ADD_ATTR: ['open'],
  });
}

const LABELS = {
  'ai-cli':          'AI CLI 工具',
  'ai-cli-en':       'AI CLI Tools',
  'ai-agents':       'AI Agents 生态',
  'ai-agents-en':    'AI Agents Ecosystem',
  'ai-web':          'OpenAI & Anthropic 官网动态',
  'ai-web-en':       'OpenAI & Anthropic Updates',
  'ai-trending':     'GitHub AI 趋势',
  'ai-trending-en':  'GitHub AI Trends',
  'ai-hn':           'HN 社区动态',
  'ai-hn-en':        'HN Community Digest',
  'ai-ph':           'Product Hunt AI',
  'ai-ph-en':        'Product Hunt AI',
  'ai-arxiv':        'ArXiv AI 研究',
  'ai-arxiv-en':     'ArXiv AI Research',
  'ai-hf':           'HF 热门模型',

// ── Routing ──
function parseRoute() {
  const [a, b] = location.hash.slice(1).split('/');
  if (a === 'favorites') return { type: 'favorites', kind: FAV_KINDS.includes(b) ? b : 'all' };
  if (/^\d{4}-\d{2}-\d{2}$/.test(a) && b) return { type: 'report', date: a, report: b };
  return null;
}
function readFocus() {
  const f = new URLSearchParams(location.search).get('focus');
  if (f) pendingFocus = f;
}
function reportExists(date, report) {
  return manifestDates.some((d) => d.date === date && d.reports.includes(report));
}
async function handleRoute() {
  readFocus();
  const route = parseRoute();
  if (route?.type === 'favorites') { renderFavoritesView(route.kind); return; }
  if (route?.type === 'report' && reportExists(route.date, route.report)) {
    if (`${route.date}/${route.report}` === currentKey) applyPendingFocus();
    else await loadReport(route.date, route.report, false);
    return;
  }
  const first = manifestDates[0];
  if (first?.reports?.length) {
    history.replaceState(null, '', `#${first.date}/${first.reports[0]}`);
    await loadReport(first.date, first.reports[0], false);
  }
}

const loadedSearchMonths = new Set();

let searchGeneration = 0;

// ── Favorites state (Phase 1 bookmarks + Phase 2 sync) ──
const FAV_KEY = 'radar-favorites';
const FAV_HIDDEN_KEY = 'radar-favorites-hidden'; // legacy local tombstones (migrated to deleted_at)
const FAV_SYNCED_KEY = 'radar-favorites-synced-at';
const FAV_KINDS = ['report', 'link', 'excerpt'];
const FAV_KIND_LABEL = { report: '整篇', link: '链接', excerpt: '段落' };
// Single source of truth for "a favoritable block" — selection and decoration
// MUST use the same selector so every excerpt block gets a resolvable anchor.
const FAV_BLOCK_SELECTOR = 'p, blockquote, li, td, h2, h3, h4';
const FAV_SYNC_DEBOUNCE = 5000;
let favoriteStore = { version: 1, updated_at: '', items: [] };
let favoriteIds = new Set(); // alive ids only (no deleted_at)
let currentFavFilter = null; // null = report view; else 'all'|'report'|'link'|'excerpt'
let pendingFocus = null;
// Phase 2 sync: tombstones live in favoriteStore.items as items with deleted_at.
let favSyncedAt = localStorage.getItem(FAV_SYNCED_KEY) || '';
let favSyncing = false;
let favSyncError = '';
let favSyncTimer = null;

// Items the user can still see — tombstones (deleted_at) excluded.
function aliveItems() { return favoriteStore.items.filter((it) => !it.deleted_at); }

function loadLocalFavorites() {
  try {
    const raw = JSON.parse(localStorage.getItem(FAV_KEY) || 'null');
    if (raw && Array.isArray(raw.items)) return raw;
  } catch (_) { /* corrupt → ignore */ }
  return { version: 1, updated_at: '', items: [] };
}

function loadHiddenFavorites() {
  try {
    const raw = JSON.parse(localStorage.getItem(FAV_HIDDEN_KEY) || 'null');
    if (Array.isArray(raw)) return raw;
  } catch (_) { /* corrupt → ignore */ }
  return [];
}

function persistFavorites() {
  favoriteStore.updated_at = new Date().toISOString();

// ── merge engine (JS mirror of the Go Bridge mergeFavorites; see main.go) ──
function favPreferNonEmpty(a, b) { return (a && String(a).trim()) ? a : b; }
function favEarliest(a, b) { if (!a) return b || ''; if (!b) return a; return a < b ? a : b; }
function favLatest(a, b) { return (a || '') > (b || '') ? (a || '') : (b || ''); }
function mergeSource(a, b) {
  a = a || {}; b = b || {};
  return {
    date: favPreferNonEmpty(b.date, a.date) || '',
    report: favPreferNonEmpty(b.report, a.report) || '',
    label: favPreferNonEmpty(b.label, a.label) || '',
    url: favPreferNonEmpty(b.url, a.url) || '',
    anchor: favPreferNonEmpty(b.anchor, a.anchor) || '',
  };
}
// Combine two records of the same id; b is the newer fold input. created_at keeps
// the earliest (stable sort key); revived_at keeps the latest re-favorite event;
// life/death uses max(created_at, revived_at) vs max(deleted_at) so a stale
// tombstone can't re-kill an item revived after it. Mirror of Go mergeTwo.
function mergeItem(a, b) {
  const out = { ...a };
  out.kind = a.kind || b.kind || '';
  for (const f of ['title', 'url', 'site', 'excerpt', 'section']) {
    out[f] = favPreferNonEmpty(b[f], a[f]) || '';
  }
  out.source = mergeSource(a.source, b.source);
  out.created_at = favEarliest(a.created_at, b.created_at);
  out.revived_at = favLatest(a.revived_at, b.revived_at);
  const delTime = favLatest(a.deleted_at, b.deleted_at);
  const aliveTime = favLatest(favLatest(a.created_at, b.created_at), out.revived_at);
  out.deleted_at = (delTime && (!aliveTime || aliveTime <= delTime)) ? delTime : '';
  if (!out.revived_at) delete out.revived_at;
  return out;
}

// Merge local bookmarks, legacy tombstones, and a published favorites.json.
// Tombstones (deleted_at) are kept so cross-device removals do not resurrect.
async function loadFavorites() {
  const local = loadLocalFavorites();
  const byId = new Map();
  const fold = (it) => {
    if (!it || !it.id) return;
    byId.set(it.id, byId.has(it.id) ? mergeItem(byId.get(it.id), it) : it);
  };
  local.items.forEach(fold);
  // Migrate legacy local-only tombstones to weak (epoch) deleted_at items, so a
  // newer real re-add anywhere still overrides them.
  loadHiddenFavorites().forEach((id) => {
    if (typeof id === 'string') fold({ id, kind: '', created_at: '', deleted_at: '1970-01-01T00:00:01.000Z', source: {} });
  });
  try {
    const res = await fetch('./favorites.json', { cache: 'no-store' });
    if (res.ok) {
      const remote = await res.json();
      (remote.items || []).forEach(fold);
    }
  } catch (_) { /* not published yet / offline */ }
  favoriteStore = { version: 1, updated_at: local.updated_at, items: [...byId.values()] };
  favoriteIds = new Set(aliveItems().map((it) => it.id));
}

// ── Phase 2 sync client (debounced, seamless; SYNC button is a fallback) ──
// Pending = any item whose latest activity (created/deleted) is newer than the
// last successful push.
function favLastActivity(it) {
  // Newest of first-favorite / revive / delete — the item's latest local change.
  return favLatest(favLatest(it.created_at, it.revived_at), it.deleted_at);
}
function pendingFavCount() {
  return favoriteStore.items.filter((it) => {
    const ts = favLastActivity(it);
    return ts && ts > favSyncedAt;
  }).length;
}
function scheduleFavSync() {
  updateBridgeButtons();
  if (!bridgeConnected) return; // stays pending; flushed on connect
  clearTimeout(favSyncTimer);
  favSyncTimer = setTimeout(() => void flushFavSync(false), FAV_SYNC_DEBOUNCE);
}
// Fold an authoritative server set onto the current store WITHOUT clobbering
// edits the user made while the request was in flight: merge by id (mergeItem
// keeps the newest event on each side), so an in-flight add/remove survives.
function reconcileWithServer(serverItems) {
  const byId = new Map();
  const fold = (it) => {
    if (!it || !it.id) return;
    byId.set(it.id, byId.has(it.id) ? mergeItem(byId.get(it.id), it) : it);
  };
  serverItems.forEach(fold);          // authoritative base
  favoriteStore.items.forEach(fold);  // current store may hold in-flight changes
  favoriteStore.items = [...byId.values()];
  localStorage.setItem(FAV_KEY, JSON.stringify(favoriteStore));
  favoriteIds = new Set(aliveItems().map((it) => it.id));
}
async function flushFavSync(showResult = false) {
  if (favSyncing || !bridgeConnected) return;
  if (!showResult && !pendingFavCount()) return;
  clearTimeout(favSyncTimer);
  favSyncing = true; favSyncError = ''; updateBridgeButtons();
  // Snapshot what we are about to confirm. The watermark is the newest activity
  // IN THE SNAPSHOT; favSyncedAt may only advance to it — never to "now" — so any
  // change made while the request is in flight stays pending and re-syncs.
  const snapshot = favoriteStore.items.map((it) => ({ ...it }));
  let ackWatermark = '';
  for (const it of snapshot) ackWatermark = favLatest(ackWatermark, favLastActivity(it));
  try {
    const res = await bridgeFetch('/api/favorites/sync', {
      method: 'POST',
      body: JSON.stringify({ items: snapshot }),
    });
    if (Array.isArray(res.items)) reconcileWithServer(res.items);
    // A sync is only fully done when BOTH products succeeded: GitHub push AND the
    // SecondBrain markdown. A vault failure is a partial success — keep it pending
    // (do NOT advance the watermark) so the auto-retry actually re-sends and heals.
    const vaultFailed = res.pushed && res.vault_written === false;
    if (res.pushed && !vaultFailed) {
      // Advance only to the snapshot's watermark, not the response time.
      favSyncedAt = favLatest(favSyncedAt, ackWatermark);
      localStorage.setItem(FAV_SYNCED_KEY, favSyncedAt);
      favSyncError = '';
    } else if (vaultFailed) {
      favSyncError = res.vault_error || 'SecondBrain 写入失败';
    } else {
      favSyncError = res.error || '待推送 GitHub';
    }
    renderFavNav();
    if (currentFavFilter) renderFavoritesView(currentFavFilter, false);
    if (showResult) {
      if (vaultFailed) alert(`GitHub 已同步，但 SecondBrain 写入失败：${res.vault_error || ''}`);
      else if (res.pushed) alert(`收藏已同步（${res.alive ?? aliveItems().length} 条）`);
      else alert(`已合并到本机，待推送：${res.error || ''}`);
    }
  } catch (e) {
    favSyncError = e.message;
    if (showResult) alert(`收藏同步失败：${e.message}`);
  } finally {
    favSyncing = false;
    updateBridgeButtons();
    // If the user changed favorites while we were syncing, or push failed,
    // schedule another flush. (Re-checks pending; no-op when fully synced.)
    if (bridgeConnected && (pendingFavCount() || favSyncError)) {
      clearTimeout(favSyncTimer);
      favSyncTimer = setTimeout(() => void flushFavSync(false), favSyncError ? 30000 : FAV_SYNC_DEBOUNCE);
    }
  }
}
// Best-effort flush when the tab is hidden/closed (keepalive survives unload).
function favSyncBeacon() {
  if (!bridgeConnected || !bridgeToken || !pendingFavCount()) return;
  try {
    fetch(`${BRIDGE_URL}/api/favorites/sync`, {
      method: 'POST', mode: 'cors', keepalive: true,
      headers: { Authorization: `Bearer ${bridgeToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: favoriteStore.items }),
    });
  } catch (_) { /* best effort */ }
}

const searchInput = document.getElementById('searchInput');
const searchStatus = document.getElementById('searchStatus');
const bridgeBtn = document.getElementById('bridgeBtn');
const syncBtn = document.getElementById('syncBtn');

function setSearchStatus(text) {
  searchStatus.textContent = text || '';
}

function applyDateSearch(query, loading = false) {
  const needle = query.trim().toLowerCase();
  let hits = 0;

  document.querySelectorAll('.date-group').forEach((grp) => {
    const hdr = grp.querySelector('.date-hdr');
    if (!hdr) return;

    if (!needle) {
      hdr.classList.remove('search-hit');
      return;
    }

    const text = searchIndex.get(grp.dataset.date) || '';
    const matched = text.includes(needle);
    hdr.classList.toggle('search-hit', matched);
    if (matched) hits += 1;
  });

  if (!needle) {
    setSearchStatus('');
  } else if (loading) {
    setSearchStatus(`已匹配 ${hits} 天，正在加载更多月份…`);
  } else {
    setSearchStatus(`匹配 ${hits} 天`);
  }
}

async function loadSearchManifest() {
  if (searchMonths.length) return;
  const res = await fetch('./search-index/manifest.json');
  if (!res.ok) throw new Error('搜索索引清单不可用');
  const data = await res.json();
  searchMonths = data.months || [];
}

async function searchAllMonths(query, generation) {
  const needle = query.trim().toLowerCase();
  if (!needle) return;
  try {
    await loadSearchManifest();
    for (const month of searchMonths) {
      if (generation !== searchGeneration || !searchQuery.trim()) return;
      if (!loadedSearchMonths.has(month)) {
        applyDateSearch(needle, true);
        const res = await fetch(`./search-index/${month}.json`);
        if (res.ok) {
          const data = await res.json();
          Object.entries(data.dates || {}).forEach(([date, text]) => searchIndex.set(date, text));
        }
        loadedSearchMonths.add(month);
      }
      applyDateSearch(needle, loadedSearchMonths.size < searchMonths.length);
    }
    if (generation === searchGeneration) applyDateSearch(needle, false);
  } catch (error) {
    setSearchStatus(`搜索索引加载失败：${error.message}`);
  }
}

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  searchGeneration += 1;
  const generation = searchGeneration;
  clearTimeout(searchDebounce);
  if (!searchQuery.trim()) {
    applyDateSearch('');
    return;
  }
  applyDateSearch(searchQuery, true);
  searchDebounce = setTimeout(() => searchAllMonths(searchQuery, generation), 180);
});

function consumeBridgeToken() {
  const url = new URL(location.href);
  const token = url.searchParams.get('bridge_token');
  if (!token) return;
  bridgeToken = token;
  localStorage.setItem(BRIDGE_TOKEN_KEY, token);
  url.searchParams.delete('bridge_token');
  history.replaceState(null, '', url.pathname + url.search + url.hash);
}

async function bridgeFetch(path, options = {}) {
  if (!bridgeToken) throw new Error('本机尚未配对');
  const headers = new Headers(options.headers || {});
  headers.set('Authorization', `Bearer ${bridgeToken}`);
  if (options.body) headers.set('Content-Type', 'application/json');
  const res = await fetch(`${BRIDGE_URL}${path}`, { ...options, headers, mode: 'cors' });
  if (res.status === 401) {
    bridgeToken = '';
    localStorage.removeItem(BRIDGE_TOKEN_KEY);
    throw new Error('本机配对已失效');
  }
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${res.status}`);
  }
  return res.json();
}

function updateBridgeButtons(message) {
  bridgeBtn.classList.toggle('connected', bridgeConnected);
  const pending = pendingFavCount();
  let label = bridgeConnected ? 'SecondBrain 已连接' : '本机未连接';
  if (favSyncing) label += ' · 同步收藏中…';
  else if (pending) label += ` · ${pending} 条待同步`;
  bridgeBtn.textContent = label;
  let title = message || (bridgeConnected ? '本地 Bridge 已连接' : '点击连接本地 SecondBrain');
  if (favSyncError) title = `收藏未同步：${favSyncError}`;
  else if (pending && !bridgeConnected) title = `${pending} 条收藏待同步，连接后自动上传`;
  bridgeBtn.title = title;
  syncBtn.disabled = !bridgeConnected || bridgeSyncing || favSyncing;
  syncBtn.classList.toggle('busy', bridgeSyncing || favSyncing);
  syncBtn.textContent = (bridgeSyncing || favSyncing) ? '同步中…' : 'SYNC';
}

function connectBridge() {
  const returnUrl = location.origin + location.pathname;
  location.href = `${BRIDGE_URL}/pair?return=${encodeURIComponent(returnUrl)}`;
}

async function refreshBridgeStatus(triggerSync = false) {
  if (!bridgeToken) {
    bridgeConnected = false;
    updateBridgeButtons();
    return;
  }
  try {
    const status = await bridgeFetch('/api/status');
    bridgeConnected = true;
    bridgeSyncing = !!status.syncing;
    // Adopt the Bridge-persisted favorites error (e.g. a prior vault-write failure)
    // so the warning survives a page refresh. Don't clobber an in-flight local error.
    if (!favSyncing && !favSyncError && status.favorites_error) {
      favSyncError = status.favorites_error;
    }
    updateBridgeButtons(status.last_error || `上次同步：${status.last_sync || '尚未同步'}`);
    if (triggerSync && !bridgeSyncing) void syncBridge(false);
    // pendingFavCount() stays > 0 after a vault failure (watermark not advanced),
    // so this also drives the vault-write retry — no separate trigger needed.
    if (pendingFavCount()) void flushFavSync(false);
  } catch (error) {
    bridgeConnected = false;
    updateBridgeButtons(error.message);
  }
}

async function syncBridge(showResult = true) {
  if (!bridgeConnected) {
    connectBridge();
    return;
  }
  bridgeSyncing = true;
  updateBridgeButtons();
  try {
    const result = await bridgeFetch('/api/sync', { method: 'POST' });
    if (showResult) alert(`同步完成：新增或更新 ${result.updated} 个文件，跳过 ${result.skipped} 个文件。`);
  } catch (error) {
    if (showResult) alert(`同步失败：${error.message}`);
  } finally {
    bridgeSyncing = false;
    updateBridgeButtons();
  }
}

function currentSource() {
  const [date = '', report = ''] = (currentKey || '').split('/');
  return {
    date,
    report,
    label: LABELS[report] || report,
    url: `${location.origin}${location.pathname}#${currentKey || ''}`,
  };
}

function nearestSection(element) {
  let cursor = element;
  while (cursor) {
    let sibling = cursor.previousElementSibling;
    while (sibling) {
      if (/^H[2-4]$/.test(sibling.tagName)) return sibling.textContent.trim();
      sibling = sibling.previousElementSibling;
    }
    cursor = cursor.parentElement;
    if (!cursor?.classList?.contains('md')) break;
  }
  return '';
}

function cleanExcerpt(element) {
  const clone = element.cloneNode(true);
  clone.querySelectorAll('.fav-report-btn').forEach((node) => node.remove());
  return clone.textContent.replace(/\s+/g, ' ').trim().slice(0, 1800);
}

// ── stable IDs: SHA-256 hex over canonical strings (must match Go Bridge) ──
// Mirror of bridge normalizeFavoriteURL: lowercase scheme+host, drop fragment,
// strip utm_*/ref/source params, stable-sort query, collapse root path "/" → "".
// Go uses url.String() + url.Values.Encode(); we reproduce that byte-for-byte.
function normalizeUrl(href) {
  let u;
  try {
    u = new URL((href || '').trim(), location.href);
  } catch (_) {
    return (href || '').trim();
  }
  if (u.protocol !== 'http:' && u.protocol !== 'https:') return (href || '').trim();
  u.protocol = u.protocol.toLowerCase();
  u.hostname = u.hostname.toLowerCase();
  u.hash = '';
  for (const key of [...u.searchParams.keys()]) {
    const lower = key.toLowerCase();
    if (lower.startsWith('utm_') || lower === 'ref' || lower === 'source') {
      u.searchParams.delete(key);
    }
  }
  u.searchParams.sort();
  // Go's url.Values.Encode() encodes spaces as '+' (same as URLSearchParams),
  // but URLSearchParams also percent-encodes a handful of chars Go leaves raw.
  const query = encodeGoQuery(u.searchParams);
  let path = u.pathname;
  if (path === '/') path = '';
  return `${u.protocol}//${u.host}${path}${query ? '?' + query : ''}`;
}

// Reproduce Go url.Values.Encode(): RFC3986-ish escaping where space→'+',
// matching net/url.QueryEscape so JS and Go derive the same favorite ID.
function encodeGoQuery(params) {
  const parts = [];
  for (const [k, v] of params) {
    parts.push(goQueryEscape(k) + '=' + goQueryEscape(v));
  }
  return parts.join('&');
}
function goQueryEscape(s) {
  let out = '';
  for (const ch of s) {
    if (/[A-Za-z0-9\-_.~]/.test(ch)) { out += ch; continue; }
    if (ch === ' ') { out += '+'; continue; }
    for (const byte of new TextEncoder().encode(ch)) {
      out += '%' + byte.toString(16).toUpperCase().padStart(2, '0');
    }
  }
  return out;
}

// Mirror of bridge normalizeText: collapse whitespace, trim, lowercase.
// Used ONLY for ID hashing — never for display (it discards case).
function normalizeText(text) {
  return (text || '').replace(/\s+/g, ' ').trim().toLowerCase();
}
// Display/length helper: collapse whitespace + trim, but keep original case.
function normalizeDisplayText(text) {
  return (text || '').replace(/\s+/g, ' ').trim();
}
async function sha256Hex(input) {
  const data = new TextEncoder().encode(input);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, '0')).join('');
}
function favKeyString(kind, parts) {
  if (kind === 'report') return `report\n${parts.date}\n${parts.report}`;
  if (kind === 'link') return `link\n${normalizeUrl(parts.url)}`;
  return `excerpt\n${parts.date}\n${parts.report}\n${normalizeText(parts.excerpt)}`;
}
function favId(kind, parts) {
  return sha256Hex(favKeyString(kind, parts));
}

// Content-derived locator for the DOM block that contains an excerpt.
// Independent of the user's selected sub-string, so the same block always
// resolves to the same anchor across re-renders — used for highlight + jump-back.
// (Local-only in Phase 1; lives under source.anchor.)
function blockAnchorId(date, report, blockText) {
  return sha256Hex(`block\n${date}\n${report}\n${normalizeText(blockText)}`);
}

function siteOf(href) {
  try { return new URL(href, location.href).hostname; } catch (_) { return ''; }
}

// ── add / remove / toggle (localStorage + debounced Bridge sync) ──
function addFavorite(item) {
  const existing = favoriteStore.items.find((it) => it.id === item.id);
  if (existing) {
    if (!existing.deleted_at) return false; // already alive
    // Revive a tombstone: refresh content, keep the original created_at (sort key),
    // stamp revived_at = now so this re-favorite survives a stale remote tombstone.
    const firstCreated = existing.created_at || item.created_at;
    Object.assign(existing, item, {
      created_at: firstCreated,
      revived_at: new Date().toISOString(),
      deleted_at: '',
    });
  } else {
    favoriteStore.items.push(item);
  }
  persistFavorites();
  renderFavNav();
  if (currentFavFilter) renderFavoritesView(currentFavFilter, false);
  scheduleFavSync();
  return true;
}
function removeFavorite(id) {
  // Soft-delete: keep a tombstone so the removal syncs and never resurrects.
  const it = favoriteStore.items.find((x) => x.id === id);
  if (it) it.deleted_at = new Date().toISOString();
  persistFavorites();
  renderFavNav();
  scheduleFavSync();
}
function toggleFavorite(item) {
  if (favoriteIds.has(item.id)) { removeFavorite(item.id); return false; }
  addFavorite(item);
  return true;
}

// ── popover (shared by link hover + text selection) ──
let popover = null;
let popoverShowTimer = null;
let popoverHideTimer = null;
function ensurePopover() {
  if (popover) return popover;
  popover = document.createElement('div');
  popover.className = 'fav-popover';
  popover.addEventListener('mousedown', (e) => e.preventDefault()); // keep text selection
  popover.addEventListener('click', () => {
    const action = popover._action;
    hidePopover();
    if (action) action();
  });
  popover.addEventListener('mouseenter', () => clearTimeout(popoverHideTimer));
  popover.addEventListener('mouseleave', () => { popoverHideTimer = setTimeout(hidePopover, 140); });
  document.body.appendChild(popover);
  return popover;
}
function showPopover(x, y, text, action) {
  ensurePopover();
  popover.textContent = text;
  popover._action = action;
  popover.style.left = Math.max(8, Math.min(x, window.innerWidth - 120)) + 'px';
  popover.style.top = Math.max(8, y) + 'px';
  popover.classList.add('show');
}
function hidePopover() {
  if (popover) { popover.classList.remove('show'); popover._action = null; }
}

// ── link favorite toggle ──
function toggleLinkFavorite(link, id, url) {
  const source = currentSource();
  const context = link.closest('li, tr, td, p, blockquote') || link.parentElement;
  const nowSaved = toggleFavorite({
    id,
    kind: 'link',
    title: normalizeDisplayText(link.textContent) || siteOf(url),
    url,
    site: siteOf(url),
    excerpt: context ? cleanExcerpt(context) : '',
    section: nearestSection(context || link),
    created_at: new Date().toISOString(),
    source,
  });
  link.classList.toggle('fav-link-saved', nowSaved);
}

function bindLinkHover(link, id, url) {
  link.addEventListener('mouseenter', () => {
    clearTimeout(popoverHideTimer);
    clearTimeout(popoverShowTimer);
    popoverShowTimer = setTimeout(() => {
      const r = link.getBoundingClientRect();
      const saved = favoriteIds.has(id);
      showPopover(r.left, r.top - 32, saved ? '取消收藏链接' : '收藏链接', () => toggleLinkFavorite(link, id, url));
    }, 320);
  });
  link.addEventListener('mouseleave', () => {
    clearTimeout(popoverShowTimer);
    popoverHideTimer = setTimeout(() => { if (!popover?.matches(':hover')) hidePopover(); }, 160);
  });
}

// ── text-selection → favorite the SELECTED TEXT, anchored to its block ──
// Resolve the favoritable block that contains the current selection.
function selectionBlock() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) return null;
  let node = sel.getRangeAt(0).commonAncestorContainer;
  if (node.nodeType === 3) node = node.parentElement;
  if (!node || !node.closest) return null;
  if (!node.closest('#content .md')) return null;
  if (node.closest('pre')) return null;
  return node.closest(FAV_BLOCK_SELECTOR) || null;
}
function setupSelectionFavorites() {
  document.addEventListener('mouseup', (e) => {
    if (popover && popover.contains(e.target)) return;
    // Capture selection text + block SYNCHRONOUSLY — the async id() below and
    // clicking the popover can clear the selection, so we must not re-read it.
    const selectedText = normalizeDisplayText(window.getSelection()?.toString() || '');
    const block = selectionBlock();
    setTimeout(async () => {
      if (!block || selectedText.length < 8) { hidePopover(); return; }
      const source = currentSource();
      const blockText = cleanExcerpt(block);
      const id = await favId('excerpt', { date: source.date, report: source.report, excerpt: selectedText });
      const anchor = await blockAnchorId(source.date, source.report, blockText);
      const saved = favoriteIds.has(id);
      // bubble at the cursor's upper-right
      showPopover(e.clientX + 12, e.clientY - 34, saved ? '取消收藏段落' : '收藏段落', () => {
        const section = nearestSection(block);
        toggleFavorite({
          id,
          kind: 'excerpt',
          title: section || selectedText.slice(0, 60),
          excerpt: selectedText,
          section,
          created_at: new Date().toISOString(),
          source: { ...source, anchor },
        });
        // Highlight the whole containing block while any excerpt still points at it.
        block.dataset.favAnchor = anchor;
        block.classList.toggle('fav-block-saved', blockHasSavedExcerpt(anchor));
        window.getSelection()?.removeAllRanges();
      });
    }, 10);
  });
  document.addEventListener('mousedown', (e) => {
    if (popover && !popover.contains(e.target)) hidePopover();
  });
  document.addEventListener('scroll', hidePopover, true);
}

// A block stays highlighted while ANY excerpt favorite points at its anchor.
function blockHasSavedExcerpt(anchor) {
  if (!anchor) return false;
  return favoriteStore.items.some(
    (it) => it.kind === 'excerpt' && !it.deleted_at && it.source?.anchor === anchor,
  );
}

// ── decorate a freshly rendered report ──
async function enhanceFavorites() {
  const container = document.querySelector('#content .md');
  if (!container) return;
  const source = currentSource();

  // 1) whole-report star next to the first <h1>
  const h1 = container.querySelector('h1');
  if (h1 && !h1.querySelector('.fav-report-btn')) {
    const id = await favId('report', source);
    h1.dataset.favoriteId = id;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'fav-report-btn';
    const sync = () => {
      const saved = favoriteIds.has(id);
      btn.textContent = saved ? '★' : '☆';
      btn.classList.toggle('saved', saved);
      btn.title = saved ? '取消收藏整篇报告' : '收藏整篇报告';
      h1.classList.toggle('fav-report-saved', saved);
    };
    btn.onclick = () => {
      toggleFavorite({
        id,
        kind: 'report',
        title: normalizeDisplayText(cleanExcerpt(h1)) || source.label,
        excerpt: '',
        section: '',
        created_at: new Date().toISOString(),
        source,
      });
      sync();
    };
    h1.appendChild(btn);
    sync();
  }

  // 2) links — highlight if saved + hover popover (no persistent star)
  const links = [...container.querySelectorAll('a[href]')].filter((a) => {
    try { return /^https?:$/.test(new URL(a.href, location.href).protocol); } catch (_) { return false; }
  });
  await Promise.all(links.map(async (link) => {
    const url = new URL(link.href, location.href).href;
    const id = await favId('link', { url });
    link.dataset.favoriteId = id;
    link.classList.toggle('fav-link-saved', favoriteIds.has(id));
    bindLinkHover(link, id, url);
  }));

  // 3) blocks — stamp each with its content anchor; highlight when any saved
  //    excerpt favorite points at that anchor (selection popover handles adding).
  const blocks = [...container.querySelectorAll(FAV_BLOCK_SELECTOR)];
  await Promise.all(blocks.map(async (block) => {
    if (block.closest('pre')) return;
    const blockText = cleanExcerpt(block);
    if (blockText.length < 8) return;
    const anchor = await blockAnchorId(source.date, source.report, blockText);
    block.dataset.favAnchor = anchor;
    block.classList.toggle('fav-block-saved', blockHasSavedExcerpt(anchor));
  }));
}

bridgeBtn.onclick = connectBridge;
syncBtn.onclick = () => { void syncBridge(true); void flushFavSync(true); };

// ════════════════════════════════════════════════════════════
//  Favorites: sidebar nav + list view + jump-back
// ════════════════════════════════════════════════════════════
function renderFavNav() {
  const favNav = document.getElementById('favNav');
  if (!favNav) return;
  const counts = { all: 0, report: 0, link: 0, excerpt: 0 };
  aliveItems().forEach((it) => { counts.all += 1; if (counts[it.kind] != null) counts[it.kind] += 1; });
  const defs = [['all', '全部收藏'], ['report', '整篇报告'], ['link', '链接'], ['excerpt', '段落']];
  favNav.innerHTML = '';
  defs.forEach(([kind, label]) => {
    const b = document.createElement('button');
    b.className = 'fav-nav-btn' + (currentFavFilter === kind ? ' active' : '');
    const name = document.createElement('span');
    name.textContent = label;
    const cnt = document.createElement('span');
    cnt.className = 'fav-count';
    cnt.textContent = counts[kind];
    b.append(name, cnt);
    b.onclick = () => { location.hash = kind === 'all' ? 'favorites' : `favorites/${kind}`; };
    favNav.appendChild(b);
  });
}

function favTimeGroup(iso) {
  const d = new Date(iso);
  const day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((today - day) / 86400000);
  if (diff <= 0) return '今天收藏';
  if (diff === 1) return '昨天收藏';
  if (diff === 2) return '前天收藏';
  const p = (n) => String(n).padStart(2, '0');
  return `${day.getFullYear()}-${p(day.getMonth() + 1)}-${p(day.getDate())} 收藏`;
}
function favFmtTime(iso) {
  const d = new Date(iso);
  const p = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function esc(s) {
  return (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function renderFavoritesView(kind, scroll = true) {
  currentFavFilter = kind;
  currentKey = null;
  document.querySelectorAll('.rpt-btn, .lang-btn').forEach((b) => b.classList.remove('active'));
  document.querySelectorAll('.date-hdr.lit, .month-hdr.lit').forEach((h) => h.classList.remove('lit'));
  renderFavNav();
  document.getElementById('sidebar').classList.remove('open');

  let items = aliveItems();
  if (kind !== 'all') items = items.filter((it) => it.kind === kind);
  items.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

  const titleMap = { all: '全部收藏', report: '整篇报告', link: '链接收藏', excerpt: '段落摘录' };
  const head = `<div class="fav-list-head">★ ${titleMap[kind] || '我的收藏'}</div>` +
    `<div class="fav-list-sub">共 ${items.length} 条 · 按收藏时间倒序</div>`;

  if (!items.length) {
    setContent(`<div class="md fade">${head}<div class="fav-empty">还没有收藏。<br>在日报里收藏整篇报告（标题旁星标）、悬停链接或选中段落试试。</div></div>`);
    if (scroll) document.getElementById('cwrap').scrollTop = 0;
    return;
  }

  let html = `<div class="md fade">${head}`;
  let lastLabel = null;
  items.forEach((it) => {
    const label = favTimeGroup(it.created_at);
    if (label !== lastLabel) { html += `<div class="fav-group-label">${esc(label)}</div>`; lastLabel = label; }
    const badge = FAV_KIND_LABEL[it.kind] || it.kind;
    const srcDate = it.source?.date || '';
    const srcLabel = it.source?.label || it.source?.report || '';
    html += `<div class="fav-card" data-id="${esc(it.id)}">` +
      `<div class="fav-card-title"><span class="fav-badge">${esc(badge)}</span><span>${esc(it.title)}</span></div>`;
    if (it.kind === 'excerpt' && it.excerpt) html += `<div class="fav-excerpt">${esc(it.excerpt)}</div>`;
    html += `<div class="fav-meta">来源：${esc(srcDate)}${srcLabel ? ' · ' + esc(srcLabel) : ''}` +
      `<br>收藏时间：${esc(favFmtTime(it.created_at))}`;
    if (it.kind === 'link' && it.site) html += `<br>网站：${esc(it.site)}`;
    html += '</div><div class="fav-actions">' +
      `<button class="fav-action" data-act="goto">${it.kind === 'report' ? '回到报告' : '回到原文'}</button>`;
    if (it.kind === 'link' && it.url) html += '<button class="fav-action" data-act="open">打开外链</button>';
    html += '<button class="fav-action danger" data-act="remove">取消收藏</button></div></div>';
  });
  html += '</div>';
  setContent(html);
  if (scroll) document.getElementById('cwrap').scrollTop = 0;

  document.querySelectorAll('.fav-card').forEach((card) => {
    const item = favoriteStore.items.find((it) => it.id === card.dataset.id);
    if (!item) return;
    card.querySelector('[data-act="goto"]')?.addEventListener('click', () => gotoFavorite(item));
    card.querySelector('[data-act="open"]')?.addEventListener('click', () => window.open(item.url, '_blank', 'noopener'));
    card.querySelector('[data-act="remove"]')?.addEventListener('click', () => {
      removeFavorite(item.id);
      renderFavoritesView(currentFavFilter, false);
    });
  });
}

function gotoFavorite(item) {
  const date = item.source?.date;
  const report = item.source?.report;
  if (!date || !report) return;
  // Excerpts resolve via their block anchor (the excerpt id is never on the DOM);
  // report/link resolve via the favorite id stamped as data-favorite-id.
  const target = item.kind === 'excerpt' ? item.source?.anchor || item.id : item.id;
  pendingFocus = target;
  history.pushState(null, '', `${location.pathname}?focus=${encodeURIComponent(target)}#${date}/${report}`);
  handleRoute();
}

function applyPendingFocus() {
  const id = pendingFocus;
  pendingFocus = null;
  if (location.search) history.replaceState(null, '', location.pathname + location.hash);
  if (!id) return;
  // Match either a directly-stamped favorite id (report/link) or a block anchor (excerpt).
  const sel = CSS.escape(id);
  const el = document.querySelector(
    `#content [data-favorite-id="${sel}"], #content [data-fav-anchor="${sel}"]`,
  );
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.add('fav-flash');
  setTimeout(() => el.classList.remove('fav-flash'), 1700);
}

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

async function loadReport(date, report, push = true) {
  const key = `${date}/${report}`;
  if (key === currentKey) return;
  currentKey = key;
  if (currentFavFilter) { currentFavFilter = null; renderFavNav(); }

  if (push) history.pushState(null, '', `#${key}`);

  // Sync sidebar
  document.querySelectorAll('.rpt-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.querySelectorAll('.date-hdr').forEach(h => {
    const grp = h.closest('.date-group');
    const hasActive = grp.querySelector('.rpt-btn.active') || grp.querySelector('.lang-btn.active');
    h.classList.toggle('lit', !!hasActive);
  });
  document.querySelectorAll('.month-hdr').forEach(h => {
    const mGrp = h.closest('.month-group');
    const hasActive = mGrp.querySelector('.lang-btn.active') || mGrp.querySelector('.rpt-btn.active');
    h.classList.toggle('lit', !!hasActive);
  });
  document.querySelectorAll('.date-group').forEach(g => {
    if (g.dataset.date === date) {
      g.classList.add('open');
      // Also open parent month group
      const monthGrp = g.closest('.month-group');
      if (monthGrp) monthGrp.classList.add('open');
    }
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  const cwrap = document.getElementById('cwrap');
  setContent('<div class="msg"><div class="msg-icon">⏳</div><div>Loading…</div></div>');
  cwrap.scrollTop = 0;

  try {
    const res = await fetch(`./digests/${date}/${report}.md`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.text();
    const safe = renderMarkdown(raw);
    setContent(`<div class="md fade">${safe}</div>`);
    await enhanceFavorites();
    applyPendingFocus();
  } catch (e) {
    setContent(`<div class="msg"><div class="msg-icon">⚠️</div><div>加载失败：${e.message}</div></div>`);
  }
}

function buildDateGroup(date, reports, isFirst) {
  const grp = document.createElement('div');
  grp.className = 'date-group' + (isFirst ? ' open' : '');
  grp.dataset.date = date;

  const hdr = document.createElement('div');
  hdr.className = 'date-hdr';
  // Show only the day part (DD) since month is already in the parent header
  const dayLabel = date.slice(8); // "03" from "2026-04-03"
  const dateText = document.createTextNode(dayLabel + '\u00a0');
  const arrSpan = document.createElement('span');
  arrSpan.className = 'arr';
  arrSpan.textContent = '▶';
  hdr.appendChild(dateText);
  hdr.appendChild(arrSpan);
  hdr.onclick = () => grp.classList.toggle('open');

  const list = document.createElement('div');
  list.className = 'rpt-list';

  const baseReports = reports.filter(r => !r.endsWith('-en'));
  baseReports.forEach(r => {
    const enKey = r + '-en';
    const hasEn = reports.includes(enKey);

    if (hasEn) {
      const row = document.createElement('div');
      row.className = 'rpt-row';

      const label = document.createElement('span');
      label.className = 'rpt-label';
      const baseLabel = LABELS[r] || r;
      label.textContent = baseLabel;
      label.title = baseLabel;

      const btns = document.createElement('div');
      btns.className = 'lang-btns';

      const zhBtn = document.createElement('button');
      zhBtn.className = 'lang-btn';
      zhBtn.dataset.key = `${date}/${r}`;
      zhBtn.textContent = 'ZH';
      zhBtn.onclick = () => loadReport(date, r);

      const enBtn = document.createElement('button');
      enBtn.className = 'lang-btn';
      enBtn.dataset.key = `${date}/${enKey}`;
      enBtn.textContent = 'EN';
      enBtn.onclick = () => loadReport(date, enKey);

      btns.append(zhBtn, enBtn);
      row.append(label, btns);
      list.appendChild(row);
    } else {
      const btn = document.createElement('button');
      btn.className = 'rpt-btn';
      btn.dataset.key = `${date}/${r}`;
      btn.textContent = LABELS[r] || r;
      btn.onclick = () => loadReport(date, r);
      list.appendChild(btn);
    }
  });

  grp.append(hdr, list);
  return grp;
}

function buildNav(dates) {
  const nav = document.getElementById('nav');

  // Group dates by month (YYYY-MM)
  const months = new Map();
  dates.forEach((entry) => {
    const month = entry.date.slice(0, 7); // "2026-04"
    if (!months.has(month)) months.set(month, []);
    months.get(month).push(entry);
  });

  let isFirstDate = true;
  let isFirstMonth = true;
  months.forEach((entries, month) => {
    const mGrp = document.createElement('div');
    mGrp.className = 'month-group' + (isFirstMonth ? ' open' : '');

    const mHdr = document.createElement('div');
    mHdr.className = 'month-hdr';
    const mText = document.createTextNode(month + '\u00a0');
    const mArr = document.createElement('span');
    mArr.className = 'arr';
    mArr.textContent = '▶';
    mHdr.appendChild(mText);
    mHdr.appendChild(mArr);
    mHdr.onclick = () => mGrp.classList.toggle('open');

    const mBody = document.createElement('div');
    mBody.className = 'month-body';

    entries.forEach(({ date, reports }) => {
      mBody.appendChild(buildDateGroup(date, reports, isFirstDate));
      isFirstDate = false;
    });

    mGrp.append(mHdr, mBody);
    nav.appendChild(mGrp);
    isFirstMonth = false;
  });
}

window.addEventListener('popstate', () => { void handleRoute(); });

// ── Init ──
(async () => {
  consumeBridgeToken();
  updateBridgeButtons();
  await loadFavorites();
  renderFavNav();
  setupSelectionFavorites();
  // Flush pending favorites on tab hide / close (keepalive survives unload).
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') favSyncBeacon(); });
  window.addEventListener('pagehide', favSyncBeacon);
  await refreshBridgeStatus(true);

  try {
    const res = await fetch('./manifest.json');
    if (!res.ok) throw new Error('manifest.json not found');
    const { dates } = await res.json();
    if (!dates?.length) throw new Error('manifest is empty');

    manifestDates = dates;
    buildNav(dates);
    await handleRoute();
  } catch (e) {
    document.getElementById('nav').innerHTML =
      '<div class="msg" style="height:80px;font-size:10px">⚠️ ' + e.message + '</div>';
    setContent('<div class="msg"><div class="msg-icon">📡</div><div>无法加载 manifest.json</div></div>');
  }
})();
