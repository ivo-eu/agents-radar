name: Daily Agents Radar

on:
  schedule:
    # 每天 00:17 UTC = 08:17 CST (UTC+8).
    # Avoid the top-of-hour Actions scheduling peak, where runs can be delayed or dropped.
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agents-radar-publish
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    # Web content fetching adds ~60-120 s of HTTP requests on incremental runs;
    # the first-ever run (fetching 50 articles) may need up to 20 min.
    timeout-minutes: 40
    env:
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_STREAM: "true"
      PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
      DIGEST_REPO: ${{ github.repository }}
      PUBLISH_ISSUES: "false"
      PAGES_URL: https://ivo-eu.github.io/agents-radar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run daily digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm start

      - name: Commit digest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No new digest files to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            HUSKY=0 git commit -m "digest: ${DATE} daily digest"
            git pull --rebase
            git push
          fi

      - name: Update web manifest
        run: pnpm manifest

      - name: Commit manifest and feed
        run: |
          git add manifest.json sync-manifest.json feed.xml search-index/
          if ! git diff --cached --quiet; then
            HUSKY=0 git commit -m "chore: update web indexes"
            git pull --rebase
            git push
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '@agents_radar' }}
        run: pnpm notify

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URLS: ${{ secrets.FEISHU_WEBHOOK_URLS }}
        run: pnpm notify:feishu
